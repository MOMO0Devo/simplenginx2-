apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-notifications-cm
  namespace: argocd
data:
  # Context section: defines variables available in notification templates
  context: |
    argocdUrl: "http://localhost:8080"  # Replace with your ArgoCD server URL

  # Email service configuration: SMTP settings for sending emails
  service.email: |
    username: mamkm8276@gmail.com        # Email username (set as secret)
    password: ovqsuuxtavbspgfw         # Email password (set as secret)
    host: smtp.gmail.com                 # SMTP server host
    port: 465                            # SMTP server port (SSL)
    from: mamkm8276@gmail.com            # Sender email address

  # Template for Deployed (synced + healthy)
  template.email-mohamad-deployed: |
    email:
      subject: "[ArgoCD] {{.app.metadata.name}} successfully deployed 🎉"
    message: |
      ✅ Application: {{.app.metadata.name}}
      📂 Namespace: {{.app.metadata.namespace}}
      🔄 Sync status: {{.app.status.sync.status}}
      📌 Revision: {{.app.status.sync.revision}}
      ❤️ Health status: {{.app.status.health.status}}
      ⚙️ Last operation: {{ if .app.operationState }}{{ .app.operationState.phase }}{{ else }}<none>{{ end }}
      Finished at: {{ if .app.operationState }}{{ .app.operationState.finishedAt }}{{ end }}
      🔗 Details: {{.context.argocdUrl}}/applications/{{.app.metadata.name}}

  # Template for Failed deployment
  template.email-mohamad-failed: |
    email:
      subject: "[ArgoCD] {{.app.metadata.name}} deployment FAILED ❌"
    message: |
      🚨 Application: {{.app.metadata.name}}
      📂 Namespace: {{.app.metadata.namespace}}
      🔄 Sync status: {{.app.status.sync.status}}
      ⚙️ Last operation: {{ if .app.operationState }}{{ .app.operationState.phase }}{{ else }}<none>{{ end }}
      ❤️ Health status: {{.app.status.health.status}}
      📝 Health message: {{.app.status.health.message}}
      🔗 Details: {{.context.argocdUrl}}/applications/{{.app.metadata.name}}

  # Trigger for successful deployment for your app
  trigger.mohamad-on-deployed: |
    - when: app.metadata.name == 'mohamad' && app.status.operationState.phase == 'Succeeded' && app.status.health.status == 'Healthy'
      send: [email-mohamad-deployed]

  # Trigger for failed deployment for your app
  trigger.mohamad-on-failed: |
    - when: app.metadata.name == 'mohamad' && (app.status.operationState.phase == 'Failed' || app.status.health.status == 'Degraded')
      send: [email-mohamad-failed]