# 1️⃣ Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: nginx
---
# 2️⃣ Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-world
  namespace: nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hello-world
  template:
    metadata:
      labels:
        app: hello-world
    spec:
      containers:
        - name: hello
          image: nginx
          ports:
            - containerPort: 80
---
# 3️⃣ Service
apiVersion: v1
kind: Service
metadata:
  name: hello-world
  namespace: nginx
spec:
  type: NodePort
  selector:
    app: hello-world
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30007
---
